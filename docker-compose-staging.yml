services:
  flask-app:
    image: ryanfletcher96/assignment1-b00281528:latest
    pull_policy: always
    ports:
      - "5000:5000"
    restart: always
  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - flask-app