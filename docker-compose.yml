version: "3.8"

services:
  flask_app:
    build: .
    container_name: flask_app
    restart: always
    expose:
      - "5000"

  nginx:
    image: nginx
    container_name: nginx
    restart: always
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - flask_app